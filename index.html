<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>空间手势绘画</title>
<style>
  :root {
    --safe-bottom: env(safe-area-inset-bottom, 8px);
    --safe-top: env(safe-area-inset-top, 8px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
    position: fixed;
    top: 0; left: 0;
  }

  /* ---- 视频层 ---- */
  #video-container {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    overflow: hidden;
  }
  #video {
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1); /* 镜像 */
  }
  #video.front-camera {
    transform: scaleX(-1);
  }
  #video.back-camera {
    transform: scaleX(1);
  }

  /* ---- 画布层 ---- */
  #canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 5;
  }

  /* ---- 手部骨骼层 ---- */
  #landmark-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 6;
  }

  /* ---- UI 叠加层 ---- */
  #ui-layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }
  #ui-layer > * {
    pointer-events: auto;
  }

  /* ---- 顶部状态栏 ---- */
  #top-bar {
    position: absolute;
    top: var(--safe-top);
    left: 12px; right: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 8px 14px;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 16px;
    color: #fff;
    font-size: 13px;
  }

  #status-badge {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: 600;
    font-size: 12px;
    transition: all 0.3s;
  }
  #status-badge.drawing { background: #4CAF50; color: #fff; }
  #status-badge.erasing { background: #fff; color: #333; }
  #status-badge.paused  { background: #FF9800; color: #fff; }

  #brush-preview {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.7);
    background: var(--brush-color, #FF0000);
    transition: all 0.2s;
    flex-shrink: 0;
  }

  #depth-indicator {
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    min-width: 60px; text-align: center;
  }

  .top-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.15);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .top-btn:active {
    background: rgba(255,255,255,0.35);
    transform: scale(0.92);
  }

  /* ---- 底部工具栏 ---- */
  #bottom-bar {
    position: absolute;
    bottom: calc(12px + var(--safe-bottom));
    left: 12px; right: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  #color-row {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    padding: 8px 12px;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 20px;
  }
  .color-dot {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 2.5px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }
  .color-dot:active { transform: scale(1.2); }
  .color-dot.active {
    border-color: #fff;
    box-shadow: 0 0 12px currentColor;
    transform: scale(1.15);
  }

  #tool-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    padding: 8px 14px;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 20px;
  }
  .tool-btn {
    height: 38px;
    min-width: 44px;
    padding: 0 14px;
    border-radius: 20px;
    border: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    transition: all 0.2s;
    color: #fff;
    background: rgba(255,255,255,0.12);
    white-space: nowrap;
  }
  .tool-btn:active {
    background: rgba(255,255,255,0.3);
    transform: scale(0.94);
  }
  .tool-btn.on {
    background: rgba(255,255,255,0.28);
    box-shadow: 0 0 8px rgba(255,255,255,0.25);
  }
  .tool-btn.danger {
    background: rgba(244,67,54,0.5);
    color: #fff;
  }
  .tool-btn.danger:active {
    background: rgba(244,67,54,0.8);
  }

  #brush-size-control {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 16px;
  }
  #brush-size-control button {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.2);
    color: #fff;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  #brush-size-control button:active { background: rgba(255,255,255,0.45); }
  #brush-size-label {
    color: #fff; font-size: 12px; font-weight: 600;
    min-width: 28px; text-align: center;
  }

  /* ---- Toast / 提示 ---- */
  #toast {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: rgba(0,0,0,0.8);
    color: #fff;
    padding: 10px 24px;
    border-radius: 24px;
    font-size: 15px;
    font-weight: 600;
    pointer-events: none;
    opacity: 0;
    transition: all 0.25s cubic-bezier(0.18, 0.89, 0.32, 1.28);
    z-index: 100;
  }
  #toast.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  /* ---- 清空确认弹窗 ---- */
  #clear-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  #clear-overlay.show {
    opacity: 1; pointer-events: auto;
  }
  #clear-dialog {
    background: #1e1e1e;
    border-radius: 20px;
    padding: 24px;
    text-align: center;
    color: #fff;
    max-width: 300px;
    width: 85%;
  }
  #clear-dialog h3 { margin-bottom: 8px; }
  #clear-dialog p { font-size: 13px; color: #aaa; margin-bottom: 16px; }
  #clear-dialog button {
    padding: 10px 24px;
    border-radius: 20px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin: 0 6px;
    transition: all 0.2s;
  }
  #clear-dialog .btn-cancel { background: rgba(255,255,255,0.15); color: #fff; }
  #clear-dialog .btn-confirm { background: #F44336; color: #fff; }

  /* ---- 手势调试/反馈 ---- */
  #gesture-hint {
    position: absolute;
    left: 50%; bottom: calc(160px + var(--safe-bottom));
    transform: translateX(-50%);
    padding: 6px 16px;
    border-radius: 16px;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    color: rgba(255,255,255,0.75);
    font-size: 11px;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  /* ---- 响应式 ---- */
  @media (max-width: 400px) {
    .color-dot { width: 26px; height: 26px; }
    .tool-btn { font-size: 11px; padding: 0 10px; height: 34px; }
    #top-bar { padding: 6px 10px; }
    #status-badge { font-size: 10px; padding: 3px 10px; }
  }
</style>
</head>
<body>

<!-- 视频层 -->
<div id="video-container">
  <video id="video" class="front-camera" autoplay playsinline muted></video>
</div>

<!-- 画布层 -->
<canvas id="canvas"></canvas>

<!-- 手部骨骼层 -->
<canvas id="landmark-canvas"></canvas>

<!-- UI 层 -->
<div id="ui-layer">

  <!-- Toast -->
  <div id="toast"></div>

  <!-- 顶部状态栏 -->
  <div id="top-bar">
    <span id="status-badge" class="drawing">🖊️ 绘画中</span>
    <div id="brush-preview" style="--brush-color:#FF3B30;"></div>
    <span id="depth-indicator">粗细:5px</span>
    <button id="btn-camera-switch" class="top-btn" title="切换摄像头">🔄</button>
  </div>

  <!-- 手势提示 -->
  <div id="gesture-hint">将手放入摄像头区域</div>

  <!-- 底部工具栏 -->
  <div id="bottom-bar">
    <!-- 颜色选择 -->
    <div id="color-row"></div>

    <!-- 工具按钮 -->
    <div id="tool-row">
      <button id="btn-eraser" class="tool-btn">🧹 橡皮擦</button>
      <button id="btn-pause" class="tool-btn">⏯️ 暂停</button>
      <button id="btn-clear" class="tool-btn danger">🗑️ 清空</button>
      <div id="brush-size-control">
        <button id="btn-size-minus">−</button>
        <span id="brush-size-label">5px</span>
        <button id="btn-size-plus">+</button>
      </div>
    </div>
  </div>

  <!-- 清空确认弹窗 -->
  <div id="clear-overlay">
    <div id="clear-dialog">
      <h3>🗑️ 确认清空画布？</h3>
      <p>此操作无法撤销</p>
      <button class="btn-cancel" id="btn-clear-cancel">取消</button>
      <button class="btn-confirm" id="btn-clear-confirm">确认清空</button>
    </div>
  </div>
</div>

<!-- ==================== 脚本 ==================== -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
// ==================== 常量 ====================
const COLORS = [
  '#FF3B30', '#FF9500', '#FFCC00', '#34C759',
  '#007AFF', '#5856D6', '#AF52DE', '#000000', '#FFFFFF'
];

const COLOR_NAMES = ['红', '橙', '黄', '绿', '蓝', '靛', '紫', '黑', '白'];

const GESTURE = {
  NONE: 'none',
  DRAW: 'draw',           // 单食指 → 绘画
  SWITCH_COLOR: 'switch', // 食指+中指 → 切换颜色
  ERASE: 'erase',         // 握拳 → 橡皮擦
  CLEAR: 'clear',         // 拇指+食指捏合 → 清空
  PAUSE: 'pause',         // 仅拇指 → 暂停/继续
};

// ==================== 状态 ====================
let state = {
  mode: 'draw',           // 'draw' | 'erase' | 'paused'
  currentColor: COLORS[0],
  currentColorIdx: 0,
  brushSize: 5,
  minBrush: 2,
  maxBrush: 20,
  isDrawing: false,
  lastPoint: null,
  lastMidPoint: null,
  lastGesture: GESTURE.NONE,
  gestureDebounceUntil: 0,
  gestureHoldStart: 0,
  clearHoldTriggered: false,
  facingMode: 'user',     // 'user' (前置) | 'environment' (后置)
  cameraReady: false,
};

// ==================== DOM 引用 ====================
const videoEl    = document.getElementById('video');
const canvasEl   = document.getElementById('canvas');
const ctx        = canvasEl.getContext('2d');
const lmcEl      = document.getElementById('landmark-canvas');
const lmcCtx      = lmcEl.getContext('2d');

const statusBadge    = document.getElementById('status-badge');
const brushPreview   = document.getElementById('brush-preview');
const depthIndicator = document.getElementById('depth-indicator');
const gestureHint    = document.getElementById('gesture-hint');
const toastEl        = document.getElementById('toast');
const clearOverlay   = document.getElementById('clear-overlay');
const colorRow       = document.getElementById('color-row');
const brushSizeLabel = document.getElementById('brush-size-label');

// ==================== Canvas 尺寸适配 ====================
function resizeCanvases() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  [canvasEl, lmcEl].forEach(el => {
    el.width  = w * devicePixelRatio;
    el.height = h * devicePixelRatio;
    el.style.width  = w + 'px';
    el.style.height = h + 'px';
  });
  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(devicePixelRatio, devicePixelRatio);
  lmcCtx.setTransform(1,0,0,1,0,0);
  lmcCtx.scale(devicePixelRatio, devicePixelRatio);
}
window.addEventListener('resize', resizeCanvases);
window.addEventListener('orientationchange', () => setTimeout(resizeCanvases, 200));
resizeCanvases();

// ==================== Toast ====================
let toastTimer = null;
function showToast(msg, duration = 1200) {
  clearTimeout(toastTimer);
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), duration);
}

// ==================== 颜色选择器 ====================
function buildColorRow() {
  colorRow.innerHTML = '';
  COLORS.forEach((c, i) => {
    const dot = document.createElement('div');
    dot.className = 'color-dot' + (i === state.currentColorIdx ? ' active' : '');
    dot.style.backgroundColor = c;
    dot.title = COLOR_NAMES[i];
    dot.addEventListener('click', () => setColor(i));
    dot.addEventListener('touchend', (e) => { e.preventDefault(); setColor(i); });
    colorRow.appendChild(dot);
  });
}

function setColor(idx) {
  state.currentColorIdx = idx;
  state.currentColor = COLORS[idx];
  state.mode = 'draw';
  updateUI();
  buildColorRow();
  showToast('🎨 ' + COLOR_NAMES[idx] + '色');
}

function cycleColor() {
  const next = (state.currentColorIdx + 1) % COLORS.length;
  setColor(next);
}

// ==================== UI 更新 ====================
function updateUI() {
  brushPreview.style.setProperty('--brush-color', state.mode === 'erase' ? '#fff' : state.currentColor);
  brushSizeLabel.textContent = state.brushSize + 'px';
  depthIndicator.textContent = '粗细:' + state.brushSize + 'px';

  statusBadge.className = '';
  if (state.mode === 'draw') {
    statusBadge.classList.add('drawing');
    statusBadge.innerHTML = '🖊️ 绘画中';
    document.getElementById('btn-eraser').classList.remove('on');
    document.getElementById('btn-pause').classList.remove('on');
  } else if (state.mode === 'erase') {
    statusBadge.classList.add('erasing');
    statusBadge.innerHTML = '🧹 橡皮擦';
    document.getElementById('btn-eraser').classList.add('on');
    document.getElementById('btn-pause').classList.remove('on');
  } else if (state.mode === 'paused') {
    statusBadge.classList.add('paused');
    statusBadge.innerHTML = '⏸️ 已暂停';
    document.getElementById('btn-pause').classList.add('on');
  }
}

// ==================== 摄像头 ====================
async function startCamera() {
  try {
    if (videoEl.srcObject) {
      const tracks = videoEl.srcObject.getTracks();
      tracks.forEach(t => t.stop());
    }
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: state.facingMode,
        width: { ideal: 1280 },
        height: { ideal: 720 },
      },
      audio: false,
    });
    videoEl.srcObject = stream;
    videoEl.className = state.facingMode === 'user' ? 'front-camera' : 'back-camera';

    await new Promise(r => { videoEl.onloadedmetadata = r; });
    await videoEl.play();
    state.cameraReady = true;
    resizeCanvases();
  } catch (err) {
    console.error('摄像头启动失败:', err);
    gestureHint.textContent = '⚠️ 无法访问摄像头，请检查权限';
  }
}

async function switchCamera() {
  state.facingMode = state.facingMode === 'user' ? 'environment' : 'user';
  state.cameraReady = false;
  showToast(state.facingMode === 'user' ? '📱 前置摄像头' : '🌍 后置摄像头');
  await startCamera();
  state.cameraReady = true;
}

document.getElementById('btn-camera-switch').addEventListener('click', switchCamera);
document.getElementById('btn-camera-switch').addEventListener('touchend', (e) => {
  e.preventDefault(); switchCamera();
});

// ==================== MediaPipe Hands ====================
let hands = null;
let lastHandLandmarks = null;

async function initHands() {
  hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`,
  });

  hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 1,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.5,
  });

  hands.onResults(onHandResults);

  // 等到视频就绪后开始处理
  const processFrame = async () => {
    if (state.cameraReady && videoEl.readyState >= 2) {
      await hands.send({ image: videoEl });
    }
    requestAnimationFrame(processFrame);
  };
  processFrame();
}

// ==================== 手势识别 ====================
function isFingerExtended(lm, tipIdx, pipIdx, mcpIdx) {
  // 指尖 y < pip y < mcp y 表示手指向上伸展（图像坐标y轴向下）
  // 使用更鲁棒的判断
  const tipY = lm[tipIdx].y;
  const pipY = lm[pipIdx].y;
  const mcpY = lm[mcpIdx].y;
  // 指尖明显在 pip 之上 → 伸展
  return (pipY - tipY) > 0.03;
}

function isThumbExtended(lm) {
  // 拇指特殊：比较指尖与 IP 关节的 x 距离
  const tipX = lm[4].x;
  const ipX  = lm[3].x;
  const mcpX = lm[2].x;
  // 拇指伸展时指尖横向远离手掌
  const dist = Math.abs(tipX - mcpX);
  return dist > 0.05;
}

function getExtendedFingers(lm) {
  return {
    thumb:  isThumbExtended(lm),
    index:  isFingerExtended(lm, 8, 6, 5),
    middle: isFingerExtended(lm, 12, 10, 9),
    ring:   isFingerExtended(lm, 16, 14, 13),
    pinky:  isFingerExtended(lm, 20, 18, 17),
  };
}

function classifyGesture(lm) {
  const f = getExtendedFingers(lm);
  const { thumb, index, middle, ring, pinky } = f;
  const extendedCount = [thumb, index, middle, ring, pinky].filter(Boolean).length;

  // 拇指+食指捏合检测 → 清空
  const thumbTip = lm[4];
  const indexTip = lm[8];
  const pinchDist = Math.hypot(thumbTip.x - indexTip.x, thumbTip.y - indexTip.y);
  const isPinching = pinchDist < 0.05 && !middle && !ring && !pinky;

  if (isPinching) {
    return GESTURE.CLEAR;
  }

  // 握拳 → 橡皮擦
  if (extendedCount === 0) {
    return GESTURE.ERASE;
  }

  // 仅食指 → 绘画
  if (index && !middle && !ring && !pinky) {
    return GESTURE.DRAW;
  }

  // 食指 + 中指 → 切换颜色
  if (index && middle && !ring && !pinky) {
    return GESTURE.SWITCH_COLOR;
  }

  // 仅拇指 → 暂停
  if (thumb && !index && !middle && !ring && !pinky) {
    return GESTURE.PAUSE;
  }

  // 五指张开 → 也映射为清空（备选）
  if (extendedCount >= 4) {
    return GESTURE.CLEAR;
  }

  return GESTURE.NONE;
}

function getDepthFactor(lm) {
  // 使用手腕到中指 MCP 的屏幕空间距离估算深度
  const wrist = lm[0];
  const midMcp = lm[9];
  const screenDist = Math.hypot(wrist.x - midMcp.x, wrist.y - midMcp.y);
  // 正常范围约 0.05 ~ 0.4，映射到 0~1
  const factor = Math.max(0, Math.min(1, (screenDist - 0.05) / 0.35));
  return factor;
}

// ==================== 手部结果处理 ====================
function onHandResults(results) {
  lmcCtx.clearRect(0, 0, lmcEl.width / devicePixelRatio, lmcEl.height / devicePixelRatio);

  if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
    lastHandLandmarks = null;
    gestureHint.textContent = '将手放入摄像头区域';
    if (state.isDrawing) {
      state.lastPoint = null;
      state.lastMidPoint = null;
      state.isDrawing = false;
    }
    return;
  }

  const lm = results.multiHandLandmarks[0];
  lastHandLandmarks = lm;

  // 绘制手部骨骼
  drawLandmarks(lm);

  // 手势分类
  const gesture = classifyGesture(lm);
  const now = Date.now();

  // 更新提示
  const hintMap = {
    [GESTURE.DRAW]: '🖊️ 食指绘画 (近=粗 远=细)',
    [GESTURE.SWITCH_COLOR]: '✌️ 切换颜色',
    [GESTURE.ERASE]: '✊ 橡皮擦',
    [GESTURE.CLEAR]: '🤏 捏合清空画布',
    [GESTURE.PAUSE]: '👍 暂停/继续',
    [GESTURE.NONE]: '识别中...',
  };
  gestureHint.textContent = hintMap[gesture] || hintMap[GESTURE.NONE];

  // ---- 清空画布（捏合保持1.5s）----
  if (gesture === GESTURE.CLEAR) {
    if (!state.clearHoldTriggered) {
      if (state.gestureHoldStart === 0) {
        state.gestureHoldStart = now;
      }
      const elapsed = now - state.gestureHoldStart;
      if (elapsed > 1500 && state.gestureDebounceUntil < now) {
        state.clearHoldTriggered = true;
        clearCanvas();
        state.gestureDebounceUntil = now + 1500;
        state.gestureHoldStart = 0;
      }
      // 显示进度
      if (elapsed > 300) {
        gestureHint.textContent = '🤏 保持捏合清空... ' + Math.round(elapsed / 1500 * 100) + '%';
      }
    }
    return;
  } else {
    state.clearHoldTriggered = false;
    state.gestureHoldStart = 0;
  }

  // ---- 手势动作（带防抖）----
  if (gesture !== GESTURE.NONE && gesture !== GESTURE.DRAW && gesture !== GESTURE.ERASE) {
    if (state.gestureDebounceUntil < now && gesture !== state.lastGesture) {
      state.gestureDebounceUntil = now + 600;

      switch (gesture) {
        case GESTURE.SWITCH_COLOR:
          cycleColor();
          break;
        case GESTURE.PAUSE:
          togglePause();
          break;
      }
    }
    state.lastGesture = gesture;
    return;
  }

  state.lastGesture = gesture;

  // ---- 绘画 / 橡皮擦 ----
  if (state.mode === 'paused') return;

  if (gesture === GESTURE.DRAW || gesture === GESTURE.ERASE) {
    // 根据手势自动切换模式
    const desiredMode = gesture === GESTURE.ERASE ? 'erase' : 'draw';
    if (state.mode !== desiredMode && state.gestureDebounceUntil < now) {
      state.mode = desiredMode;
      updateUI();
    }

    // 获取食指指尖坐标
    const indexTip = lm[8];
    const px = indexTip.x * window.innerWidth;
    const py = indexTip.y * window.innerHeight;

    // 深度 → 笔触大小
    const depthFactor = getDepthFactor(lm);
    const dynamicSize = state.mode === 'erase'
      ? state.brushSize * 1.8  // 橡皮擦大一些
      : state.minBrush + depthFactor * (state.maxBrush - state.minBrush);
    state.brushSize = Math.round(dynamicSize);
    updateUI();

    // 开始新笔画
    if (!state.isDrawing) {
      state.isDrawing = true;
      state.lastPoint = { x: px, y: py };
      state.lastMidPoint = { x: px, y: py };
      // 画一个点
      drawDot(px, py, state.brushSize);
      return;
    }

    // 平滑绘制
    const midPoint = {
      x: (state.lastPoint.x + px) / 2,
      y: (state.lastPoint.y + py) / 2,
    };
    drawSmoothLine(state.lastMidPoint, midPoint, state.lastPoint, state.brushSize);
    state.lastPoint = { x: px, y: py };
    state.lastMidPoint = midPoint;
  } else {
    // 手势丢失 → 结束笔画
    if (state.isDrawing) {
      state.isDrawing = false;
      state.lastPoint = null;
      state.lastMidPoint = null;
    }
  }
}

// ==================== 绘制函数 ====================
// (定义在下方初始化区，使用 globalCompositeOperation)

function clearCanvas() {
  ctx.clearRect(0, 0, canvasEl.width / devicePixelRatio, canvasEl.height / devicePixelRatio);
  showToast('🗑️ 画布已清空');
  document.getElementById('clear-overlay').classList.remove('show');
}

// ==================== 手部骨骼绘制 ====================
const FINGER_CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],       // 拇指
  [0,5],[5,6],[6,7],[7,8],       // 食指
  [0,9],[9,10],[10,11],[11,12],  // 中指
  [0,13],[13,14],[14,15],[15,16],// 无名指
  [0,17],[17,18],[18,19],[19,20],// 小指
  [5,9],[9,13],[13,17],          // 手掌
];

function drawLandmarks(lm) {
  const w = window.innerWidth;
  const h = window.innerHeight;

  // 连线
  lmcCtx.strokeStyle = 'rgba(0,255,100,0.5)';
  lmcCtx.lineWidth = 2;
  FINGER_CONNECTIONS.forEach(([a, b]) => {
    lmcCtx.beginPath();
    lmcCtx.moveTo(lm[a].x * w, lm[a].y * h);
    lmcCtx.lineTo(lm[b].x * w, lm[b].y * h);
    lmcCtx.stroke();
  });

  // 关键点
  lm.forEach((pt, i) => {
    const px = pt.x * w;
    const py = pt.y * h;
    lmcCtx.fillStyle = i === 8 ? '#FF3B30' : 'rgba(255,255,255,0.8)';
    lmcCtx.beginPath();
    lmcCtx.arc(px, py, i === 8 ? 6 : 3, 0, Math.PI * 2);
    lmcCtx.fill();
  });
}

// ==================== 工具按钮 ====================
function toggleEraser() {
  state.mode = state.mode === 'erase' ? 'draw' : 'erase';
  updateUI();
  showToast(state.mode === 'erase' ? '🧹 橡皮擦模式' : '🖊️ 绘画模式');
}

function togglePause() {
  state.mode = state.mode === 'paused' ? 'draw' : 'paused';
  state.isDrawing = false;
  state.lastPoint = null;
  state.lastMidPoint = null;
  updateUI();
  showToast(state.mode === 'paused' ? '⏸️ 已暂停' : '▶️ 已继续');
}

function showClearConfirm() {
  document.getElementById('clear-overlay').classList.add('show');
}

function hideClearConfirm() {
  document.getElementById('clear-overlay').classList.remove('show');
}

document.getElementById('btn-eraser').addEventListener('click', toggleEraser);
document.getElementById('btn-eraser').addEventListener('touchend', (e) => { e.preventDefault(); toggleEraser(); });

document.getElementById('btn-pause').addEventListener('click', togglePause);
document.getElementById('btn-pause').addEventListener('touchend', (e) => { e.preventDefault(); togglePause(); });

document.getElementById('btn-clear').addEventListener('click', showClearConfirm);
document.getElementById('btn-clear').addEventListener('touchend', (e) => { e.preventDefault(); showClearConfirm(); });

document.getElementById('btn-clear-confirm').addEventListener('click', clearCanvas);
document.getElementById('btn-clear-cancel').addEventListener('click', hideClearConfirm);

// 笔触大小手动调节
document.getElementById('btn-size-plus').addEventListener('click', () => {
  state.brushSize = Math.min(state.maxBrush, state.brushSize + 1);
  updateUI();
});
document.getElementById('btn-size-plus').addEventListener('touchend', (e) => {
  e.preventDefault();
  state.brushSize = Math.min(state.maxBrush, state.brushSize + 1);
  updateUI();
});
document.getElementById('btn-size-minus').addEventListener('click', () => {
  state.brushSize = Math.max(state.minBrush, state.brushSize - 1);
  updateUI();
});
document.getElementById('btn-size-minus').addEventListener('touchend', (e) => {
  e.preventDefault();
  state.brushSize = Math.max(state.minBrush, state.brushSize - 1);
  updateUI();
});

// ==================== 初始化 ====================
async function init() {
  resizeCanvases();
  buildColorRow();
  updateUI();
  await startCamera();
  await initHands();
  gestureHint.textContent = '✋ 将手放入摄像头区域';
  showToast('🚀 手势绘画已就绪', 1500);

  // 设置画布绘制模式（背景透明，但橡皮擦用黑色覆盖视频层实际上不可见...）
  // 修正：画布背景应该透明，保留笔画。橡皮擦模式时用 clear 或与背景相同的处理
  // 这里我们让 canvas 透明，只有笔画在上面。橡皮擦用 destination-out 或直接清除区域
}

// 修正橡皮擦：使用 globalCompositeOperation
function drawDot(x, y, size) {
  if (state.mode === 'erase') {
    ctx.save();
    ctx.globalCompositeOperation = 'destination-out';
    ctx.fillStyle = 'rgba(0,0,0,1)';
    ctx.beginPath();
    ctx.arc(x, y, size / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  } else {
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = state.currentColor;
    ctx.beginPath();
    ctx.arc(x, y, size / 2, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawSmoothLine(from, to, control, size) {
  if (state.mode === 'erase') {
    ctx.save();
    ctx.globalCompositeOperation = 'destination-out';
    ctx.strokeStyle = 'rgba(0,0,0,1)';
    ctx.lineWidth = size;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(from.x, from.y);
    ctx.quadraticCurveTo(control.x, control.y, to.x, to.y);
    ctx.stroke();
    ctx.restore();
  } else {
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = state.currentColor;
    ctx.lineWidth = size;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(from.x, from.y);
    ctx.quadraticCurveTo(control.x, control.y, to.x, to.y);
    ctx.stroke();
  }
}

init().catch(err => {
  console.error('初始化失败:', err);
  gestureHint.textContent = '⚠️ 初始化失败，请刷新重试';
});
</script>
