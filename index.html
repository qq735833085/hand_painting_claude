<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>3D 空间手势绘画</title>
<style>
  :root {
    --safe-bottom: env(safe-area-inset-bottom, 8px);
    --safe-top: env(safe-area-inset-top, 8px);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%; overflow:hidden; background:#000;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    touch-action:pan-x pan-y pinch-zoom;
    -webkit-tap-highlight-color:transparent;
    -webkit-user-select:none; user-select:none;
    position:fixed; top:0; left:0;
  }

  /* ===== 视频背景层 ===== */
  #video-bg {
    position:absolute; top:0; left:0;
    width:100%; height:100%;
    object-fit:cover;
    z-index:1;
  }
  #video-bg.mirror { transform:scaleX(-1); }

  /* ===== Three.js 3D 笔画层 ===== */
  #three-canvas {
    position:absolute; top:0; left:0;
    width:100%; height:100%;
    z-index:5;
    display:block;
  }

  /* ===== UI 层 ===== */
  #ui-layer {
    position:absolute; top:0; left:0;
    width:100%; height:100%;
    pointer-events:none; z-index:10;
  }
  #ui-layer > * { pointer-events:auto; }

  /* 顶部状态栏 */
  #top-bar {
    position:absolute; top:var(--safe-top); left:8px; right:8px;
    display:flex; align-items:center; justify-content:space-between; gap:6px;
    padding:6px 10px;
    background:rgba(0,0,0,0.45); backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border-radius:14px; color:#fff; font-size:11px;
  }
  #status-badge {
    display:flex; align-items:center; gap:4px;
    padding:3px 9px; border-radius:14px;
    font-weight:700; font-size:10px; transition:all 0.3s;
    white-space:nowrap;
  }
  #status-badge.drawing { background:#4CAF50; color:#fff; }
  #status-badge.erasing { background:#fff; color:#333; }
  #status-badge.paused  { background:#FF9800; color:#fff; }
  #status-badge.orbiting { background:#2196F3; color:#fff; }

  #brush-preview {
    width:22px; height:22px; border-radius:50%;
    border:2px solid rgba(255,255,255,0.5);
    background:var(--brush-color,#FF3B30);
    transition:all 0.2s; flex-shrink:0;
  }
  #depth-info {
    font-size:9px; color:rgba(255,255,255,0.6);
    text-align:center; line-height:1.2; min-width:42px;
    white-space:nowrap;
  }
  .top-btn {
    width:32px; height:32px; border-radius:50%; border:none;
    background:rgba(255,255,255,0.1); color:#fff;
    font-size:15px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.2s; flex-shrink:0;
  }
  .top-btn:active { background:rgba(255,255,255,0.35); transform:scale(0.9); }
  .top-btn.on { background:rgba(33,150,243,0.55); box-shadow:0 0 8px rgba(33,150,243,0.5); }

  /* 底部工具栏 */
  #bottom-bar {
    position:absolute;
    bottom:calc(8px + var(--safe-bottom)); left:8px; right:8px;
    display:flex; flex-direction:column; gap:6px;
  }
  #color-row {
    display:flex; justify-content:center; gap:6px; flex-wrap:wrap;
    padding:6px 10px;
    background:rgba(0,0,0,0.45); backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border-radius:16px;
  }
  .color-dot {
    width:26px; height:26px; border-radius:50%;
    border:2.5px solid transparent; cursor:pointer;
    transition:all 0.2s; box-shadow:0 2px 5px rgba(0,0,0,0.5);
  }
  .color-dot:active { transform:scale(1.2); }
  .color-dot.active { border-color:#fff; box-shadow:0 0 12px currentColor; transform:scale(1.12); }

  #tool-row {
    display:flex; justify-content:center; align-items:center;
    gap:6px; flex-wrap:wrap;
    padding:6px 10px;
    background:rgba(0,0,0,0.45); backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border-radius:16px;
  }
  .tool-btn {
    height:34px; min-width:36px; padding:0 10px;
    border-radius:16px; border:none;
    font-size:11px; font-weight:600; cursor:pointer;
    display:flex; align-items:center; gap:3px;
    transition:all 0.2s; color:#fff;
    background:rgba(255,255,255,0.1); white-space:nowrap;
  }
  .tool-btn:active { background:rgba(255,255,255,0.3); transform:scale(0.93); }
  .tool-btn.on { background:rgba(255,255,255,0.28); box-shadow:0 0 8px rgba(255,255,255,0.2); }
  .tool-btn.danger { background:rgba(244,67,54,0.4); }
  .tool-btn.accent { background:rgba(33,150,243,0.4); }
  .tool-btn.accent.on { background:rgba(33,150,243,0.65); }

  #stroke-size-ctrl {
    display:flex; align-items:center; gap:3px;
    padding:2px 7px; background:rgba(255,255,255,0.07); border-radius:13px;
  }
  #stroke-size-ctrl button {
    width:24px; height:24px; border-radius:50%; border:none;
    background:rgba(255,255,255,0.15); color:#fff;
    font-size:14px; font-weight:bold; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  #stroke-size-ctrl button:active { background:rgba(255,255,255,0.4); }
  #stroke-size-label {
    color:#fff; font-size:10px; font-weight:600;
    min-width:20px; text-align:center;
  }

  /* Toast */
  #toast {
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%) scale(0.8);
    background:rgba(0,0,0,0.78); color:#fff;
    padding:8px 20px; border-radius:20px;
    font-size:13px; font-weight:600;
    pointer-events:none; opacity:0; z-index:100;
    transition:all 0.25s cubic-bezier(0.18,0.89,0.32,1.28);
  }
  #toast.show { opacity:1; transform:translate(-50%,-50%) scale(1); }

  /* 清空确认 */
  #clear-overlay {
    position:absolute; inset:0;
    background:rgba(0,0,0,0.6);
    display:flex; align-items:center; justify-content:center;
    z-index:200; opacity:0; pointer-events:none;
    transition:opacity 0.3s;
  }
  #clear-overlay.show { opacity:1; pointer-events:auto; }
  #clear-dialog {
    background:#1e1e2e; border-radius:18px; padding:20px;
    text-align:center; color:#fff; max-width:280px; width:85%;
  }
  #clear-dialog h3 { margin-bottom:6px; font-size:15px; }
  #clear-dialog p { font-size:12px; color:#aaa; margin-bottom:14px; }
  #clear-dialog button {
    padding:8px 20px; border-radius:16px; border:none;
    font-size:13px; font-weight:600; cursor:pointer; margin:0 4px;
  }
  #clear-dialog .btn-cancel { background:rgba(255,255,255,0.12); color:#fff; }
  #clear-dialog .btn-confirm { background:#F44336; color:#fff; }

  /* 帮助说明弹窗 */
  #help-overlay {
    position:absolute; inset:0;
    background:rgba(0,0,0,0.7);
    display:flex; align-items:center; justify-content:center;
    z-index:300; opacity:0; pointer-events:none;
    transition:opacity 0.35s;
  }
  #help-overlay.show { opacity:1; pointer-events:auto; }
  #help-dialog {
    background:#1a1a2e; border-radius:20px; padding:24px 20px 18px;
    color:#fff; max-width:340px; width:88%; max-height:85vh;
    overflow-y:auto; text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
  }
  #help-dialog h2 { font-size:18px; margin-bottom:4px; }
  #help-dialog .subtitle { font-size:11px; color:#8899bb; margin-bottom:14px; }
  #help-dialog .gesture-list { text-align:left; display:flex; flex-direction:column; gap:10px; margin-bottom:14px; }
  #help-dialog .gesture-item {
    display:flex; align-items:center; gap:10px;
    padding:8px 12px; background:rgba(255,255,255,0.05); border-radius:12px;
    font-size:12px;
  }
  #help-dialog .gesture-item .g-icon {
    font-size:26px; min-width:36px; text-align:center; line-height:1;
  }
  #help-dialog .gesture-item .g-info { flex:1; }
  #help-dialog .gesture-item .g-name { font-weight:700; margin-bottom:2px; }
  #help-dialog .gesture-item .g-desc { font-size:10px; color:#aab; }
  #help-dialog .tip-box {
    background:rgba(255,200,50,0.1); border-radius:10px;
    padding:8px 12px; font-size:10px; color:#ddb;
    text-align:left; margin-bottom:14px; line-height:1.5;
  }
  #help-dialog .btn-got-it {
    padding:10px 40px; border-radius:20px; border:none;
    background:#4CAF50; color:#fff; font-size:14px;
    font-weight:700; cursor:pointer; transition:all 0.2s;
  }
  #help-dialog .btn-got-it:active { transform:scale(0.95); background:#388E3C; }

  /* 手势提示 */
  #gesture-hint {
    position:absolute; left:50%;
    bottom:calc(130px + var(--safe-bottom));
    transform:translateX(-50%);
    padding:5px 12px; border-radius:12px;
    background:rgba(0,0,0,0.35); backdrop-filter:blur(5px);
    -webkit-backdrop-filter:blur(5px);
    color:rgba(255,255,255,0.7); font-size:10px;
    pointer-events:none; text-align:center; white-space:nowrap;
  }

  /* 3D 坐标 */
  #coords-display {
    position:absolute; left:8px;
    bottom:calc(130px + var(--safe-bottom));
    padding:3px 8px; border-radius:9px;
    background:rgba(0,0,0,0.35); backdrop-filter:blur(5px);
    -webkit-backdrop-filter:blur(5px);
    color:rgba(255,255,255,0.55); font-size:9px; font-family:monospace;
    pointer-events:none;
  }

  @media (max-width:400px) {
    .color-dot { width:22px; height:22px; }
    .tool-btn { font-size:10px; padding:0 7px; height:30px; }
    .top-btn { width:28px; height:28px; font-size:13px; }
  }
</style>
</head>
<body>

<!-- 摄像头全屏背景 -->
<video id="video-bg" class="mirror" autoplay playsinline muted></video>

<!-- Three.js 3D 笔画层 -->
<canvas id="three-canvas"></canvas>

<!-- UI 层 -->
<div id="ui-layer">
  <div id="toast"></div>

  <!-- 顶部 -->
  <div id="top-bar">
    <span id="status-badge" class="drawing">🖊️ 绘画</span>
    <div id="brush-preview" style="--brush-color:#FF3B30;"></div>
    <span id="depth-info">深:0.0</span>
    <button id="btn-orbit-mode" class="top-btn" title="旋转/绘画切换">🔍</button>
    <button id="btn-reset-view" class="top-btn" title="重置视角">🏠</button>
    <button id="btn-camera-switch" class="top-btn" title="前后摄像头">🔄</button>
    <button id="btn-help" class="top-btn" title="操作说明">❓</button>
  </div>

  <div id="coords-display">X:-- Y:-- Z:--</div>
  <div id="gesture-hint">✋ 将手放入摄像头区域</div>

  <!-- 底部 -->
  <div id="bottom-bar">
    <div id="color-row"></div>
    <div id="tool-row">
      <button id="btn-eraser" class="tool-btn">🧹 擦除</button>
      <button id="btn-pause" class="tool-btn">⏯️ 暂停</button>
      <button id="btn-clear" class="tool-btn danger">🗑️ 清空</button>
      <div id="stroke-size-ctrl">
        <button id="btn-size-minus">−</button>
        <span id="stroke-size-label">6</span>
        <button id="btn-size-plus">+</button>
      </div>
      <button id="btn-undo" class="tool-btn">↩️ 撤销</button>
      <button id="btn-help-bottom" class="tool-btn">📖 说明</button>
    </div>
  </div>

  <!-- 清空确认 -->
  <div id="clear-overlay">
    <div id="clear-dialog">
      <h3>🗑️ 确认清空？</h3>
      <p>所有 3D 笔画将被清除</p>
      <button class="btn-cancel" id="btn-clear-cancel">取消</button>
      <button class="btn-confirm" id="btn-clear-confirm">确认清空</button>
    </div>
  </div>

  <!-- 帮助说明弹窗 -->
  <div id="help-overlay">
    <div id="help-dialog">
      <h2>🖐️ 3D 空间手势绘画</h2>
      <p class="subtitle">将手放入摄像头区域，用以下手势操作</p>
      <div class="gesture-list">
        <div class="gesture-item">
          <span class="g-icon">🖊️</span>
          <div class="g-info"><div class="g-name">食指伸出（单指）</div><div class="g-desc">在空间中绘画，手远近控制笔触深度</div></div>
        </div>
        <div class="gesture-item">
          <span class="g-icon">✌️</span>
          <div class="g-info"><div class="g-name">食指 + 中指（双指）</div><div class="g-desc">循环切换颜色</div></div>
        </div>
        <div class="gesture-item">
          <span class="g-icon">✊</span>
          <div class="g-info"><div class="g-name">握拳（保持0.8秒）</div><div class="g-desc">暂停 / 继续绘画</div></div>
        </div>
        <div class="gesture-item">
          <span class="g-icon">🤏</span>
          <div class="g-info"><div class="g-name">拇指食指捏合（保持1.5秒）</div><div class="g-desc">清空画布</div></div>
        </div>
      </div>
      <div class="tip-box">
        💡 <b>提示：</b>点击底部 🧹 切换橡皮擦模式；点击 🔍 或双指拖动旋转视角查看深度；所有手势操作也可通过底部按钮完成。
      </div>
      <button class="btn-got-it" id="btn-help-dismiss">我知道了，开始绘画！</button>
    </div>
  </div>
</div>

<!-- ==================== 依赖 ==================== -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ==================== 常量 ====================
const COLORS = [
  '#FF3B30','#FF9500','#FFCC00','#34C759',
  '#007AFF','#5856D6','#AF52DE','#000000','#FFFFFF'
];
const COLOR_NAMES = ['红','橙','黄','绿','蓝','靛','紫','黑','白'];

// ==================== 状态 ====================
const state = {
  mode:'draw',              // 'draw'|'erase'|'paused'
  orbitMode:false,
  currentColor:COLORS[0],
  currentColorIdx:0,
  strokeSize:0.06,
  minStroke:0.02,
  maxStroke:0.22,
  isDrawing:false,
  strokeLostTime:0,         // 笔画丢失计时（grace period 起点）
  lastGesture:'none',
  gestureStableCount:0,     // 手势连续相同帧数
  gestureDebounceUntil:0,
  gestureHoldStart:0,
  pauseHoldStart:0,
  clearHoldTriggered:false,
  pauseTriggered:false,
  facingMode:'environment',
  cameraReady:false,

  // 笔画数据
  activeStrokePts:[],
  strokes:[],
  strokeMeshes:[],

  // 手指 3D 位置
  finger3D:new THREE.Vector3(),
  fingerVisible:false,
};

// ==================== DOM ====================
const videoBg       = document.getElementById('video-bg');
const threeCanvas   = document.getElementById('three-canvas');
const statusBadge   = document.getElementById('status-badge');
const brushPreview  = document.getElementById('brush-preview');
const depthInfo     = document.getElementById('depth-info');
const gestureHint   = document.getElementById('gesture-hint');
const coordsDisplay = document.getElementById('coords-display');
const toastEl       = document.getElementById('toast');
const clearOverlay  = document.getElementById('clear-overlay');
const helpOverlay   = document.getElementById('help-overlay');
const helpDismiss   = document.getElementById('btn-help-dismiss');
const colorRow      = document.getElementById('color-row');
const sizeLabel     = document.getElementById('stroke-size-label');
const btnOrbit      = document.getElementById('btn-orbit-mode');

// ==================== Three.js 初始化 ====================
const renderer = new THREE.WebGLRenderer({ canvas:threeCanvas, antialias:true, alpha:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0); // 完全透明，让视频透过来

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(58, window.innerWidth/window.innerHeight, 0.3, 30);
camera.position.set(0, 0, 5);
camera.lookAt(0, 0, 0);

// Orbit 控制
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.15;
controls.minDistance = 2;
controls.maxDistance = 14;
controls.maxPolarAngle = Math.PI * 0.7;
controls.enabled = false;
controls.update();

// ==================== 光照 ====================
scene.add(new THREE.AmbientLight('#ffffff', 1.5));
const dirLight = new THREE.DirectionalLight('#ffffff', 3);
dirLight.position.set(3, 5, 6);
scene.add(dirLight);
const backLight = new THREE.DirectionalLight('#8899cc', 1.2);
backLight.position.set(-3, 1, -4);
scene.add(backLight);

// ==================== 参考网格 (在 Z=0 平面上) ====================
// 半透明参考面 — 帮助感知空间位置
const refPlaneGeo = new THREE.PlaneGeometry(14, 14);
const refPlaneMat = new THREE.MeshBasicMaterial({
  color:'#334466', side:THREE.DoubleSide,
  transparent:true, opacity:0.08, depthWrite:false
});
const refPlane = new THREE.Mesh(refPlaneGeo, refPlaneMat);
refPlane.position.z = 0;
scene.add(refPlane);

// 原点球
const originGeo = new THREE.SphereGeometry(0.08, 12, 12);
const originMat = new THREE.MeshStandardMaterial({ color:'#ffffff', emissive:'#ffffff', emissiveIntensity:0.6 });
const originDot = new THREE.Mesh(originGeo, originMat);
originDot.position.set(0, 0, 0);
scene.add(originDot);

// ==================== 3D 光标 ====================
const cursorGeo = new THREE.SphereGeometry(0.08, 16, 16);
const cursorMat = new THREE.MeshStandardMaterial({
  color:'#FF3B30', emissive:'#FF3B30', emissiveIntensity:0.9,
  roughness:0.3, metalness:0.1
});
const cursor3D = new THREE.Mesh(cursorGeo, cursorMat);
cursor3D.visible = false;
scene.add(cursor3D);

// 光晕
const glowGeo = new THREE.SphereGeometry(0.15, 16, 16);
const glowMat = new THREE.MeshBasicMaterial({
  color:'#FF3B30', transparent:true, opacity:0.2, depthWrite:false
});
const glow = new THREE.Mesh(glowGeo, glowMat);
cursor3D.add(glow);

// 十字准线
const crossGroup = new THREE.Group();
cursor3D.add(crossGroup);
[
  { rot:[0,0,Math.PI/2], color:'#ff6666' },  // X轴 - 红
  { rot:[0,0,0],         color:'#66ff66' },  // Y轴 - 绿
  { rot:[Math.PI/2,0,0], color:'#6666ff' },  // Z轴 - 蓝
].forEach(cfg => {
  const g = new THREE.CylinderGeometry(0.01, 0.01, 0.3, 6);
  const m = new THREE.MeshBasicMaterial({ color:cfg.color, transparent:true, opacity:0.5, depthWrite:false });
  const cyl = new THREE.Mesh(g, m);
  cyl.rotation.set(...cfg.rot);
  crossGroup.add(cyl);
});

// ==================== 活跃笔画预览 ====================
let activePreview = null;

function updatePreview() {
  if (activePreview) { scene.remove(activePreview); activePreview.geometry?.dispose(); activePreview = null; }
  const pts = state.activeStrokePts;
  if (pts.length < 2) return;

  const curve = new THREE.CatmullRomCurve3(
    pts.map(p => new THREE.Vector3(p.x, p.y, p.z)),
    false, 'catmullrom', 0.5
  );
  const size = state.mode==='erase' ? state.strokeSize*2 : state.strokeSize;
  const geo = new THREE.TubeGeometry(curve, Math.min(pts.length*4, 250), size, 8, false);
  const mat = state.mode === 'erase'
    ? new THREE.MeshBasicMaterial({ color:'#ff3333', transparent:true, opacity:0.6, wireframe:true, depthWrite:false })
    : new THREE.MeshStandardMaterial({
        color:state.currentColor, roughness:0.4, metalness:0.05,
        emissive:state.currentColor, emissiveIntensity:0.3
      });
  activePreview = new THREE.Mesh(geo, mat);
  scene.add(activePreview);
}

function finalizeStroke() {
  const pts = state.activeStrokePts;
  if (pts.length === 0) return;

  if (activePreview) { scene.remove(activePreview); activePreview.geometry?.dispose(); activePreview = null; }

  if (pts.length === 1) {
    const p = pts[0];
    const g = new THREE.SphereGeometry(state.strokeSize*0.8, 10, 10);
    const m = new THREE.MeshStandardMaterial({
      color:state.currentColor, roughness:0.4, metalness:0.05,
      emissive:state.currentColor, emissiveIntensity:0.2
    });
    const s = new THREE.Mesh(g, m);
    s.position.set(p.x, p.y, p.z);
    scene.add(s);
    state.strokeMeshes.push(s);
    state.strokes.push({ pts, color:state.currentColor, size:state.strokeSize });
    state.activeStrokePts = [];
    return;
  }

  const curve = new THREE.CatmullRomCurve3(
    pts.map(p => new THREE.Vector3(p.x, p.y, p.z)),
    false, 'catmullrom', 0.5
  );
  const segs = Math.min(pts.length * 6, 300);
  const geo = new THREE.TubeGeometry(curve, segs, state.strokeSize, 8, false);
  const mat = new THREE.MeshStandardMaterial({
    color:state.currentColor, roughness:0.45, metalness:0.05,
    emissive:state.currentColor, emissiveIntensity:0.15
  });
  const mesh = new THREE.Mesh(geo, mat);
  scene.add(mesh);
  state.strokeMeshes.push(mesh);
  state.strokes.push({ pts:[...pts], color:state.currentColor, size:state.strokeSize });
  state.activeStrokePts = [];
}

// ==================== 坐标映射 ====================
// 从屏幕坐标反投影到 3D 世界坐标
// 核心：笔画在屏幕上的位置始终与手指对齐，深度 (Z) 由手距决定
// 旋转视角时，不同深度的笔画产生视差，揭示空间层次
function mapFingerToWorld(lm) {
  // 屏幕归一化坐标 → 镜像处理
  const mx = state.facingMode==='user' ? (1 - lm[8].x) : lm[8].x;
  const my = lm[8].y;

  // 转为 NDC (Normalized Device Coordinates)
  const ndc = new THREE.Vector3(mx * 2 - 1, 1 - my * 2, 0.5);

  // 反投影 → 获取从镜头穿过该屏幕点的世界空间射线
  const worldOnRay = ndc.unproject(camera);
  const rayDir = worldOnRay.sub(camera.position).normalize();

  // 手部跨度 → 深度因子（手越近跨度越大）
  const handSpan = Math.hypot(lm[0].x - lm[9].x, lm[0].y - lm[9].y);
  const depthNorm = Math.max(0, Math.min(1, (handSpan - 0.07) / 0.28));

  // 深度映射：近→Z负(靠前), 远→Z正(靠后)
  const targetZ = 2.5 - depthNorm * 5.0;  // [2.5, -2.5]

  // 射线与 Z=targetZ 平面的交点
  const t = (targetZ - camera.position.z) / rayDir.z;
  return camera.position.clone().addScaledVector(rayDir, t);
}

// ==================== 颜色选择器 ====================
function buildColorRow() {
  colorRow.innerHTML = '';
  COLORS.forEach((c,i) => {
    const dot = document.createElement('div');
    dot.className = 'color-dot' + (i===state.currentColorIdx?' active':'');
    dot.style.backgroundColor = c;
    dot.addEventListener('click',()=>setColor(i));
    dot.addEventListener('touchend',e=>{e.preventDefault();setColor(i);});
    colorRow.appendChild(dot);
  });
}
function setColor(i) {
  state.currentColorIdx=i; state.currentColor=COLORS[i];
  state.mode='draw'; updateUI(); buildColorRow();
  cursorMat.color.set(state.currentColor);
  cursorMat.emissive.set(state.currentColor);
  glowMat.color.set(state.currentColor);
  showToast('🎨 '+COLOR_NAMES[i]);
}
function cycleColor(){ setColor((state.currentColorIdx+1)%COLORS.length); }

// ==================== Toast ====================
let toastTimer;
function showToast(msg,dur=1200){
  clearTimeout(toastTimer);
  toastEl.textContent=msg; toastEl.classList.add('show');
  toastTimer=setTimeout(()=>toastEl.classList.remove('show'),dur);
}

// ==================== UI ====================
function updateUI(){
  brushPreview.style.setProperty('--brush-color',state.mode==='erase'?'#fff':state.currentColor);
  sizeLabel.textContent = Math.round(state.strokeSize*100);
  depthInfo.textContent = '深:'+(state.finger3D.z).toFixed(1);

  statusBadge.className='';
  const be=document.getElementById('btn-eraser');
  const bp=document.getElementById('btn-pause');
  if(state.orbitMode){
    statusBadge.classList.add('orbiting');
    statusBadge.innerHTML='🔍 旋转';
    be.classList.remove('on'); bp.classList.remove('on');
    btnOrbit.classList.add('on');
  } else if(state.mode==='draw'){
    statusBadge.classList.add('drawing');
    statusBadge.innerHTML='🖊️ 绘画';
    be.classList.remove('on'); bp.classList.remove('on');
    btnOrbit.classList.remove('on');
  } else if(state.mode==='erase'){
    statusBadge.classList.add('erasing');
    statusBadge.innerHTML='🧹 擦除';
    be.classList.add('on'); bp.classList.remove('on');
    btnOrbit.classList.remove('on');
  } else {
    statusBadge.classList.add('paused');
    statusBadge.innerHTML='⏸️ 暂停';
    be.classList.remove('on'); bp.classList.add('on');
    btnOrbit.classList.remove('on');
  }
}

// ==================== 视角控制 ====================
function toggleOrbit(){
  state.orbitMode=!state.orbitMode;
  controls.enabled=state.orbitMode;
  state.isDrawing=false;
  if(state.activeStrokePts.length>0) finalizeStroke();
  showToast(state.orbitMode?'🔍 旋转视角 — 查看深度':'🖊️ 绘画模式');
  gestureHint.textContent=state.orbitMode?'🔍 拖动旋转·双指缩放':'🖊️ 食指在空间中绘画';
  updateUI();
}
function resetView(){
  camera.position.set(0,0,5);
  controls.target.set(0,0,0);
  controls.update();
  showToast('🏠 视角已重置');
}
btnOrbit.addEventListener('click',toggleOrbit);
btnOrbit.addEventListener('touchend',e=>{e.preventDefault();toggleOrbit();});
document.getElementById('btn-reset-view').addEventListener('click',resetView);
document.getElementById('btn-reset-view').addEventListener('touchend',e=>{e.preventDefault();resetView();});

// ==================== 工具按钮 ====================
function toggleEraser(){
  if(state.orbitMode){state.orbitMode=false;controls.enabled=false;}
  state.mode=state.mode==='erase'?'draw':'erase';
  if(state.activeStrokePts.length>0) finalizeStroke();
  updateUI();
  showToast(state.mode==='erase'?'🧹 擦除模式':'🖊️ 绘画模式');
}
function togglePause(){
  if(state.orbitMode){state.orbitMode=false;controls.enabled=false;}
  state.mode=state.mode==='paused'?'draw':'paused';
  if(state.activeStrokePts.length>0) finalizeStroke();
  state.isDrawing=false;
  updateUI();
  showToast(state.mode==='paused'?'⏸️ 已暂停':'▶️ 已继续');
}
function showClearConfirm(){ clearOverlay.classList.add('show'); }
function hideClearConfirm(){ clearOverlay.classList.remove('show'); }

function showHelp(){ helpOverlay.classList.add('show'); }
function hideHelp(){
  helpOverlay.classList.remove('show');
  try { localStorage.setItem('hp_help_shown','1'); } catch(e){}
}
// 帮助按钮
document.getElementById('btn-help').addEventListener('click', showHelp);
document.getElementById('btn-help').addEventListener('touchend', e=>{ e.preventDefault(); showHelp(); });
document.getElementById('btn-help-bottom').addEventListener('click', showHelp);
document.getElementById('btn-help-bottom').addEventListener('touchend', e=>{ e.preventDefault(); showHelp(); });
helpDismiss.addEventListener('click', hideHelp);
helpDismiss.addEventListener('touchend', e=>{ e.preventDefault(); hideHelp(); });
function clearAll(){
  state.strokeMeshes.forEach(m=>{scene.remove(m);m.geometry?.dispose();m.material?.dispose();});
  state.strokeMeshes=[]; state.strokes=[]; state.activeStrokePts=[];
  if(activePreview){scene.remove(activePreview);activePreview.geometry?.dispose();activePreview=null;}
  hideClearConfirm(); showToast('🗑️ 已清空');
}
function undoStroke(){
  if(!state.strokeMeshes.length){showToast('无可撤销笔画');return;}
  const m=state.strokeMeshes.pop();
  scene.remove(m); m.geometry?.dispose(); m.material?.dispose();
  state.strokes.pop();
  showToast('↩️ 已撤销');
}

document.getElementById('btn-eraser').addEventListener('click',toggleEraser);
document.getElementById('btn-eraser').addEventListener('touchend',e=>{e.preventDefault();toggleEraser();});
document.getElementById('btn-pause').addEventListener('click',togglePause);
document.getElementById('btn-pause').addEventListener('touchend',e=>{e.preventDefault();togglePause();});
document.getElementById('btn-clear').addEventListener('click',showClearConfirm);
document.getElementById('btn-clear').addEventListener('touchend',e=>{e.preventDefault();showClearConfirm();});
document.getElementById('btn-clear-confirm').addEventListener('click',clearAll);
document.getElementById('btn-clear-cancel').addEventListener('click',hideClearConfirm);
document.getElementById('btn-undo').addEventListener('click',undoStroke);
document.getElementById('btn-undo').addEventListener('touchend',e=>{e.preventDefault();undoStroke();});

// 笔径调节
document.getElementById('btn-size-plus').addEventListener('click',()=>{
  state.strokeSize=Math.min(state.maxStroke,state.strokeSize+0.02);updateUI();
});
document.getElementById('btn-size-plus').addEventListener('touchend',e=>{
  e.preventDefault(); state.strokeSize=Math.min(state.maxStroke,state.strokeSize+0.02);updateUI();
});
document.getElementById('btn-size-minus').addEventListener('click',()=>{
  state.strokeSize=Math.max(state.minStroke,state.strokeSize-0.02);updateUI();
});
document.getElementById('btn-size-minus').addEventListener('touchend',e=>{
  e.preventDefault(); state.strokeSize=Math.max(state.minStroke,state.strokeSize-0.02);updateUI();
});

// ==================== 摄像头 ====================
async function startCamera(){
  try{
    if(videoBg.srcObject){ videoBg.srcObject.getTracks().forEach(t=>t.stop()); }
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:state.facingMode, width:{ideal:1280}, height:{ideal:720} },
      audio:false
    });
    videoBg.srcObject = stream;
    videoBg.className = state.facingMode==='user'?'mirror':'';
    await videoBg.play();
    state.cameraReady = true;
    // 视频尺寸变化后更新渲染器
    setTimeout(()=>{
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth/window.innerHeight;
      camera.updateProjectionMatrix();
    }, 300);
  }catch(err){
    console.error('摄像头:',err);
    gestureHint.textContent='⚠️ 无法访问摄像头';
  }
}
async function switchCamera(){
  state.facingMode = state.facingMode==='user'?'environment':'user';
  state.cameraReady = false;
  showToast(state.facingMode==='user'?'📱 前置':'🌍 后置');
  await startCamera();
  state.cameraReady = true;
}
document.getElementById('btn-camera-switch').addEventListener('click',switchCamera);
document.getElementById('btn-camera-switch').addEventListener('touchend',e=>{e.preventDefault();switchCamera();});

// ==================== 手势识别 ====================
function isFingerUp(lm,tip,pip){ return (lm[pip].y-lm[tip].y)>0.02; }
function isThumbUp(lm){
  // 更严格的拇指检测：指尖需明显远离 MCP 关节
  return Math.abs(lm[4].x - lm[2].x) > 0.07;
}
function getFingers(lm){
  return {
    thumb:isThumbUp(lm), index:isFingerUp(lm,8,6),
    middle:isFingerUp(lm,12,10), ring:isFingerUp(lm,16,14), pinky:isFingerUp(lm,20,18)
  };
}
function classifyGesture(lm){
  const f=getFingers(lm);
  const {thumb,index,middle,ring,pinky}=f;
  const cnt=[thumb,index,middle,ring,pinky].filter(Boolean).length;

  const pinch=Math.hypot(lm[4].x-lm[8].x, lm[4].y-lm[8].y);
  if(pinch<0.05 && !middle && !ring && !pinky) return 'clear';
  if(cnt===0) return 'pause';                      // 握拳 → 暂停
  if(index && !middle && !ring && !pinky) return 'draw';
  if(index && middle && !ring && !pinky) return 'switch';
  if(cnt>=4) return 'clear';
  return 'none';
}

// ==================== MediaPipe ====================
let hands=null;

async function initHands(){
  hands = new Hands({
    locateFile:file=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`,
  });
  hands.setOptions({
    maxNumHands:1, modelComplexity:1,
    minDetectionConfidence:0.65, minTrackingConfidence:0.35,
  });
  hands.onResults(onResults);

  const loop = async () => {
    if(state.cameraReady && videoBg.readyState>=2){
      await hands.send({image:videoBg});
    }
    requestAnimationFrame(loop);
  };
  loop();
}

function onResults(results){
  const now = Date.now();

  // ---- 手部丢失 ----
  if(!results.multiHandLandmarks || results.multiHandLandmarks.length===0){
    state.fingerVisible=false; cursor3D.visible=false;
    gestureHint.textContent='✋ 将手放入摄像头区域';
    coordsDisplay.textContent='X:-- Y:-- Z:--';

    // 250ms 宽容期：短暂丢失不切断笔画
    if(state.isDrawing && state.activeStrokePts.length>0){
      if(!state.strokeLostTime) state.strokeLostTime = now;
      if(now - state.strokeLostTime > 250){
        finalizeStroke();
        state.isDrawing = false;
        state.strokeLostTime = 0;
      }
    } else {
      state.strokeLostTime = 0;
    }
    return;
  }

  const lm = results.multiHandLandmarks[0];
  state.fingerVisible=true;

  const pos3D = mapFingerToWorld(lm);
  state.finger3D.copy(pos3D);
  cursor3D.position.copy(pos3D);
  cursor3D.visible=true;
  coordsDisplay.textContent=
    `X:${pos3D.x.toFixed(1)} Y:${pos3D.y.toFixed(1)} Z:${pos3D.z.toFixed(1)}`;

  const gesture = classifyGesture(lm);

  // 手势稳定性：连续相同才确认切换
  if(gesture === state.lastGesture){
    state.gestureStableCount++;
  } else {
    state.gestureStableCount = 1;
  }
  const stableFrames = 2; // 需连续2帧确认

  const hints={
    draw:'🖊️ 食指绘画', switch:'✌️ 换色',
    clear:'🤏 捏合清空', pause:'✊ 握拳暂停', none:'...'
  };

  // 绘画中 → 显示绘画提示（除非在宽容期）
  if(state.isDrawing && (gesture==='draw' || state.strokeLostTime>0)){
    gestureHint.textContent = hints.draw;
  } else {
    gestureHint.textContent = hints[gesture]||'...';
  }

  // ---- 捏合清空 (1.5s) ----
  if(gesture==='clear'){
    if(!state.clearHoldTriggered){
      if(!state.gestureHoldStart) state.gestureHoldStart=now;
      const el=now-state.gestureHoldStart;
      if(el>1500&&state.gestureDebounceUntil<now){
        state.clearHoldTriggered=true;
        clearAll();
        state.gestureDebounceUntil=now+1500;
        state.gestureHoldStart=0;
      }
      if(el>300) gestureHint.textContent='🤏 保持捏合... '+Math.round(el/1500*100)+'%';
    }
    // 清除宽容期（用户主动操作）
    if(state.isDrawing && state.activeStrokePts.length>0){
      finalizeStroke(); state.isDrawing=false; state.strokeLostTime=0;
    }
    return;
  } else { state.clearHoldTriggered=false; state.gestureHoldStart=0; state.pauseHoldStart=0; }

  // ---- 离散手势（换色/暂停）----
  if(gesture!=='none'&&gesture!=='draw'){
    // 换色：即时触发
    if(gesture==='switch' && state.gestureDebounceUntil<now && state.gestureStableCount>=stableFrames){
      state.gestureDebounceUntil=now+600;
      cycleColor();
    }
    // 暂停（握拳）：需保持 0.8s
    if(gesture==='pause'){
      if(!state.pauseHoldStart) state.pauseHoldStart = now;
      const held = now - state.pauseHoldStart;
      if(held > 800 && state.gestureDebounceUntil < now && state.gestureStableCount>=stableFrames){
        togglePause();
        state.gestureDebounceUntil = now + 2000;
        state.pauseHoldStart = 0;
        state.pauseTriggered = true;
      }
      if(held > 200 && state.gestureDebounceUntil >= now){
        gestureHint.textContent = '✊ 已触发，冷却中...';
      } else if(held > 200){
        gestureHint.textContent = '✊ 保持握拳... ' + Math.round(Math.min(held/800,1)*100) + '%';
      }
    } else {
      state.pauseHoldStart = 0;
    }
    // 仅在手势稳定确认后才切断笔画
    if(state.gestureStableCount >= stableFrames){
      if(state.isDrawing && state.activeStrokePts.length>0){
        finalizeStroke();
        state.isDrawing = false;
        state.strokeLostTime = 0;
      }
    }
    state.lastGesture=gesture;
    return;
  }
  state.lastGesture=gesture;
  state.pauseHoldStart = 0;

  // ---- 绘画 ----
  if(state.orbitMode||state.mode==='paused'){
    if(state.isDrawing && state.activeStrokePts.length>0){
      finalizeStroke(); state.isDrawing=false; state.strokeLostTime=0;
    }
    return;
  }

  if(gesture==='draw'){
    // 画笔恢复 → 清除宽容计时
    state.strokeLostTime = 0;

    const pt={x:pos3D.x, y:pos3D.y, z:pos3D.z};

    if(!state.isDrawing){
      state.isDrawing=true;
      state.activeStrokePts=[pt];
      cursorMat.emissiveIntensity=1.3; glowMat.opacity=0.35;
      return;
    }

    // 去重（放宽阈值适应快速移动）
    if(state.activeStrokePts.length>0){
      const last=state.activeStrokePts[state.activeStrokePts.length-1];
      if(Math.hypot(pt.x-last.x,pt.y-last.y,pt.z-last.z)<0.005) return;
    }
    state.activeStrokePts.push(pt);
    if(state.activeStrokePts.length>=2) updatePreview();
  } else {
    // gesture==='none' → 宽容期内保持笔画，超时后切断
    if(state.isDrawing && state.activeStrokePts.length>0){
      if(!state.strokeLostTime) state.strokeLostTime = now;
      if(now - state.strokeLostTime > 250){
        finalizeStroke();
        state.isDrawing = false;
        state.strokeLostTime = 0;
        cursorMat.emissiveIntensity=0.9; glowMat.opacity=0.2;
      }
    } else {
      state.strokeLostTime = 0;
      cursorMat.emissiveIntensity=0.9; glowMat.opacity=0.2;
    }
  }
}

// ==================== 渲染循环 ====================
function animate(){
  requestAnimationFrame(animate);
  controls.update();

  // 光标颜色
  if(state.mode==='erase'){
    cursorMat.color.set('#ffffff');
    cursorMat.emissive.set('#ffffff');
    glowMat.color.set('#ffffff');
  } else {
    cursorMat.color.set(state.currentColor);
    cursorMat.emissive.set(state.currentColor);
    glowMat.color.set(state.currentColor);
  }

  // 脉动
  const s=1+Math.sin(performance.now()*0.005)*0.07;
  cursor3D.scale.setScalar(state.isDrawing?s*1.15:s);

  renderer.render(scene, camera);
}
animate();

// ==================== 窗口 ====================
window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

// ==================== 触摸：双指 orbit ====================
let touchCount=0;
threeCanvas.addEventListener('touchstart',e=>{
  touchCount=e.touches.length;
  if(touchCount>=2&&!state.orbitMode) controls.enabled=true;
},{passive:true});
threeCanvas.addEventListener('touchend',e=>{
  touchCount=e.touches.length;
  if(touchCount<2&&!state.orbitMode) controls.enabled=false;
},{passive:true});
threeCanvas.addEventListener('wheel',e=>{
  if(!state.orbitMode&&!e.ctrlKey){
    controls.enabled=true;
    setTimeout(()=>{if(!state.orbitMode&&touchCount<2)controls.enabled=false;},300);
  }
},{passive:true});

// ==================== 键盘 ====================
window.addEventListener('keydown',e=>{
  switch(e.key.toLowerCase()){
    case'o':toggleOrbit();break; case'r':resetView();break;
    case'e':toggleEraser();break; case' ':
      e.preventDefault();togglePause();break;
    case'c':cycleColor();break;
    case'z':if(e.ctrlKey||e.metaKey){e.preventDefault();undoStroke();}break;
    case'delete':clearAll();break; case'f':switchCamera();break;
  }
});

// ==================== 启动 ====================
async function init(){
  buildColorRow(); updateUI();
  await startCamera();
  await initHands();
  gestureHint.textContent='🖊️ 食指在空间中绘画 · 旋转视角查看深度';
  showToast('🚀 3D 空间绘画已就绪', 2000);

  // 首次访问自动弹出帮助说明
  try {
    if(!localStorage.getItem('hp_help_shown')){
      setTimeout(()=>showHelp(), 800);
    }
  } catch(e){}
}
init().catch(err=>{
  console.error('初始化失败:',err);
  gestureHint.textContent='⚠️ 初始化失败，请刷新重试';
});
</script>
